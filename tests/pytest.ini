[tool:pytest]
# Pytest configuration for the localsandbox integration tests

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    integration: marks tests as integration tests that require Docker (deselect with '-m "not integration"')
    unit: marks tests as unit tests (select with '-m unit')

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Minimum version
minversion = 6.0

# Test timeout (for integration tests)
timeout = 300

# Coverage options (if pytest-cov is installed)
# addopts = --cov=python.sandbox --cov-report=html --cov-report=term-missing